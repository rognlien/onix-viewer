<svg width="440" height="280" viewBox="0 0 440 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0B1730"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Soft accent glows -->
  <circle cx="60" cy="60" r="120" fill="#2DD4FF" opacity="0.10"/>
  <circle cx="400" cy="240" r="140" fill="#F4A35C" opacity="0.10"/>

  <!-- Book + crystal artwork at the left, 180×180 centred vertically -->
  <image href="icons/image.png" x="20" y="50" width="180" height="180"/>

  <!-- Wordmark -->
  <text x="225" y="125"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="34" font-weight="700" fill="#F4F8FF" letter-spacing="-0.5">
    ONIX Viewer
  </text>
  <text x="225" y="160"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="500" fill="#9BA8C4" letter-spacing="0">
    Pretty-print ONIX XML
  </text>
  <text x="225" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="500" fill="#9BA8C4" letter-spacing="0">
    with inline code-list lookup
  </text>

  <!-- Accent badges -->
  <rect x="225" y="208" width="58" height="22" rx="11" fill="rgba(45, 212, 255, 0.15)" stroke="#2DD4FF" stroke-width="1"/>
  <text x="254" y="223" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#2DD4FF" letter-spacing="0.4">
    ONIX 3.1
  </text>
  <rect x="290" y="208" width="118" height="22" rx="11" fill="rgba(244, 163, 92, 0.15)" stroke="#F4A35C" stroke-width="1"/>
  <text x="349" y="223" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#F4A35C" letter-spacing="0.4">
    165 code lists
  </text>
</svg>
