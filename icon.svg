<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
            <stop stop-color="#07111F"/>
            <stop offset="1" stop-color="#0B1730"/>
        </linearGradient>

        <linearGradient id="accent" x1="170" y1="120" x2="350" y2="380" gradientUnits="userSpaceOnUse">
            <stop stop-color="#2DD4FF"/>
            <stop offset="1" stop-color="#7C5CFF"/>
        </linearGradient>

        <linearGradient id="divider" x1="256" y1="120" x2="256" y2="392" gradientUnits="userSpaceOnUse">
            <stop stop-color="#44F1FF"/>
            <stop offset="1" stop-color="#63FF9B"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Outer -->
    <rect x="40" y="40" width="432" height="432" rx="92"
          fill="url(#bg)"/>

    <!-- Left tree panel -->
    <g opacity="0.95">
        <line x1="140" y1="180" x2="140" y2="332"
              stroke="#31456B"
              stroke-width="8"
              stroke-linecap="round"/>

        <!-- top -->
        <circle cx="170" cy="190" r="12" fill="#2DD4FF"/>
        <rect x="194" y="178" width="90" height="24" rx="12"
              fill="url(#accent)"/>

        <!-- middle -->
        <line x1="140" y1="250" x2="165" y2="250"
              stroke="#31456B"
              stroke-width="8"
              stroke-linecap="round"/>
        <circle cx="180" cy="250" r="12" fill="#7C5CFF"/>
        <rect x="204" y="238" width="100" height="24" rx="12"
              fill="#7C5CFF"/>

        <!-- bottom -->
        <line x1="140" y1="310" x2="165" y2="310"
              stroke="#31456B"
              stroke-width="8"
              stroke-linecap="round"/>
        <circle cx="180" cy="310" r="12" fill="#6E8BFF"/>
        <rect x="204" y="298" width="88" height="24" rx="12"
              fill="#44537A"/>
    </g>

    <!-- Divider -->
    <rect x="248" y="112" width="16" height="288" rx="8"
          fill="url(#divider)"
          filter="url(#glow)"/>

    <!-- Right preview panel -->
    <rect x="290" y="120" width="140" height="272" rx="34"
          fill="#F8FAFC"/>

    <!-- XML icon -->
    <path d="M340 185L318 208L340 231"
          stroke="url(#accent)"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M382 185L404 208L382 231"
          stroke="url(#accent)"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Text lines -->
    <rect x="326" y="264" width="80" height="12" rx="6"
          fill="#CBD5E1"/>

    <rect x="326" y="290" width="58" height="12" rx="6"
          fill="#CBD5E1"/>

    <!-- Image placeholder -->
    <rect x="326" y="330" width="72" height="52" rx="14"
          fill="#E2E8F0"/>

    <path d="M338 366L356 344L374 362L388 346L398 366"
          stroke="#5B5CF0"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"/>
</svg>