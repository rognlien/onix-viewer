# Build a release zip on tag push.
#
# Trigger: push a tag of the form vX.Y.Z (use `tools/release.sh X.Y.Z` to
# create one). The workflow runs the test suite, builds the zip, sanity-
# checks that the tag matches Resources/manifest.json, and publishes a
# GitHub release with the zip attached — ready to drag into the Chrome
# Web Store developer dashboard.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # for creating the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - run: npm test

      - name: Verify tag matches manifest version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -p "require('./Resources/manifest.json').version")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match manifest version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Build zip
        run: bash tools/package-extension.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "dist/onix-viewer-${VERSION}.zip"
