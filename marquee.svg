<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="1" stop-color="#0B1730"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Soft accent glows so the dark background feels less flat -->
  <circle cx="240" cy="160" r="240" fill="#2DD4FF" opacity="0.10"/>
  <circle cx="1180" cy="440" r="300" fill="#F4A35C" opacity="0.10"/>

  <!-- Book + crystal artwork (the real extension icon) at the left,
       360×360 centred vertically. -->
  <image href="icons/image.png" x="90" y="100" width="360" height="360"/>

  <!-- Wordmark -->
  <text x="540" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="96" font-weight="700" fill="#F4F8FF" letter-spacing="-1.5">
    ONIX Viewer
  </text>

  <!-- Tagline -->
  <text x="540" y="285"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="30" font-weight="500" fill="#9BA8C4" letter-spacing="-0.2">
    Pretty-print ONIX bibliographic XML in Chrome.
  </text>

  <!-- Feature bullets -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
     font-size="22" font-weight="500" fill="#C9D4EC">
    <circle cx="552" cy="350" r="5" fill="#2DD4FF"/>
    <text x="570" y="357">Syntax-highlighted, collapsible XML tree</text>
    <circle cx="552" cy="390" r="5" fill="#F4A35C"/>
    <text x="570" y="397">Inline EDItEUR code-list resolution (Issue 73)</text>
    <circle cx="552" cy="430" r="5" fill="#63FF9B"/>
    <text x="570" y="437">One-click popup with every code in a list</text>
  </g>

  <!-- Accent badges -->
  <rect x="540" y="470" width="98" height="32" rx="16" fill="rgba(45, 212, 255, 0.15)" stroke="#2DD4FF" stroke-width="1"/>
  <text x="589" y="491" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="600" fill="#2DD4FF" letter-spacing="0.4">
    ONIX 3.1
  </text>
  <rect x="650" y="470" width="148" height="32" rx="16" fill="rgba(244, 163, 92, 0.15)" stroke="#F4A35C" stroke-width="1"/>
  <text x="724" y="491" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="600" fill="#F4A35C" letter-spacing="0.4">
    165 code lists
  </text>
  <rect x="810" y="470" width="148" height="32" rx="16" fill="rgba(99, 255, 155, 0.13)" stroke="#63FF9B" stroke-width="1"/>
  <text x="884" y="491" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="600" fill="#63FF9B" letter-spacing="0.4">
    No data collected
  </text>
</svg>
