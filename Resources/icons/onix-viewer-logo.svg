<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Onix Viewer</title>
  <desc>Faceted geometric eye logo for the Onix Viewer Chrome extension.</desc>
  <g transform="translate(100 100)">
    <!-- Eyelids / sclera (tall almond shape) -->
    <polygon points="-90,0 0,-80 0,0" fill="#2a9fb5"/>
    <polygon points="0,-80 90,0 0,0" fill="#3ab8cf"/>
    <polygon points="-90,0 0,80 0,0" fill="#1f7a8c"/>
    <polygon points="0,80 90,0 0,0" fill="#155e6e"/>

    <!-- Iris facets -->
    <polygon points="0,-52 19.9,-48 0,0" fill="#e8a838"/>
    <polygon points="0,-52 -19.9,-48 0,0" fill="#f0c25c"/>
    <polygon points="36.8,-36.8 19.9,-48 0,0" fill="#d96b4a"/>
    <polygon points="36.8,-36.8 48,-19.9 0,0" fill="#e8855f"/>
    <polygon points="52,0 48,-19.9 0,0" fill="#2a9fb5"/>
    <polygon points="52,0 48,19.9 0,0" fill="#1f7a8c"/>
    <polygon points="36.8,36.8 48,19.9 0,0" fill="#5a7fb8"/>
    <polygon points="36.8,36.8 19.9,48 0,0" fill="#7a99cc"/>
    <polygon points="0,52 19.9,48 0,0" fill="#8e6db5"/>
    <polygon points="0,52 -19.9,48 0,0" fill="#a888c9"/>
    <polygon points="-36.8,36.8 -19.9,48 0,0" fill="#c25590"/>
    <polygon points="-36.8,36.8 -48,19.9 0,0" fill="#d674a8"/>
    <polygon points="-52,0 -48,-19.9 0,0" fill="#d96b4a"/>
    <polygon points="-52,0 -48,19.9 0,0" fill="#c25538"/>
    <polygon points="-36.8,-36.8 -48,-19.9 0,0" fill="#3ab8cf"/>
    <polygon points="-36.8,-36.8 -19.9,-48 0,0" fill="#2a9fb5"/>

    <!-- Pupil -->
    <polygon points="0,-15 11,-11 15,0 11,11 0,15 -11,11 -15,0 -11,-11" fill="#1a1a2e"/>
  </g>
</svg>
